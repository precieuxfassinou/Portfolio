<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- background -->
  <rect width="32" height="32" rx="7" fill="#0d1117"/>
  <!-- top accent bar -->
  <rect x="0" y="0" width="32" height="5" rx="3" fill="#3fe8c0"/>
  <!-- P -->
  <text x="3" y="24" font-family="Arial Black, Helvetica, sans-serif" font-weight="900" font-size="17" fill="#ffffff" letter-spacing="-1">P</text>
  <!-- F accent -->
  <text x="16" y="24" font-family="Arial Black, Helvetica, sans-serif" font-weight="900" font-size="17" fill="#3fe8c0" letter-spacing="-1">F</text>
  <!-- bottom line -->
  <rect x="3" y="27" width="26" height="2" rx="1" fill="#4f7cff" opacity="0.7"/>
</svg>
